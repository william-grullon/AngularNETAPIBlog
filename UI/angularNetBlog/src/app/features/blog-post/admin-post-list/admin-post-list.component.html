<div class="container">
  <div class="page-header">
    <div>
      <p class="eyebrow">Admin</p>
      <h1>Blog Posts</h1>
    </div>
    <a class="btn btn-primary" routerLink="/admin/posts/add">Add Post</a>
  </div>

  <ng-container *ngIf="posts$ | async as posts">
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead>
          <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Published</th>
            <th>Visible</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let post of posts">
            <td>{{ post.title }}</td>
            <td>{{ post.author }}</td>
            <td>{{ post.publishedDate | date: 'mediumDate' }}</td>
            <td>
              <span class="badge" [class.text-bg-success]="post.isVisible" [class.text-bg-secondary]="!post.isVisible">
                {{ post.isVisible ? 'Visible' : 'Hidden' }}
              </span>
            </td>
            <td class="text-end">
              <a class="btn btn-outline-primary btn-sm me-2" [routerLink]="['/admin/posts/edit', post.id]">Edit</a>
              <button class="btn btn-outline-danger btn-sm" type="button" (click)="deletePost(post.id)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </ng-container>
</div>
